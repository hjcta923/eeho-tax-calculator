name: Deploy to ChemiCloud (WordPress)

on:
  push:
    branches:
      - main   # main 브랜치에 push될 때만 자동 배포

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_SSH_PORT }} ${{ secrets.DEPLOY_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: rsync으로 플러그인 파일 배포
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_SSH_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            ./ \
            ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${{ secrets.DEPLOY_TARGET_PATH }}

      - name: 배포 결과 확인
        run: echo "✅ 배포 완료 - $(date '+%Y-%m-%d %H:%M:%S KST')"
